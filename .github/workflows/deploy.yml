name: Deploy to VPS

on:
  push:
    branches:
      - main # Change this if your default branch is different

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/yonetim-app:latest

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Create app directory if it doesn't exist
            mkdir -p ~/yonetim-app
            cd ~/yonetim-app
            
            # Pull the docker-compose file from the repository
            # Alternatively, if you manually placed the docker-compose.yml on the VPS, you can skip downloading it
            curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                 -H "Accept: application/vnd.github.v3.raw" \
                 -O -L https://api.github.com/repos/${{ github.repository }}/contents/docker-compose.yml
            
            # Pull the latest image and restart the container
            export DOCKER_IMAGE=${{ secrets.DOCKER_USERNAME }}/yonetim-app:latest
            
            # Use modern 'docker compose' (if it fails, ensure Docker is installed on your VPS)
            docker compose pull
            docker compose up -d
