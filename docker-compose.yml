version: '3.8'

services:
  app:
    image: ${DOCKER_IMAGE:-yonetim-app:latest}
    restart: unless-stopped
    ports:
      - "3050:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mysecretpassword}
      POSTGRES_DB: ${POSTGRES_DB:-yonetim}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # So you can connect using DBeaver/pgAdmin from your computer

volumes:
  postgres_data:
